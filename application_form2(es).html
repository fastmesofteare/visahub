<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitud de visado - Paso 2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: #f2f2f2;
      padding-top: 20px;
      padding-bottom: 20px;
    }

    .container {
      max-width: 800px;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
      margin: 0 auto;
    }

    .form-label {
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-control, .form-select {
      border-radius: 5px;
      border: 1px solid #ddd;
      padding: 10px 12px;
      font-size: 16px;
    }

    .form-control:focus, .form-select:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .row {
      margin-bottom: 1rem;
    }

    h4 {
      margin-top: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1.25rem;
    }

    h2 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .required-indicator {
      color: #dc3545;
    }

    .btn-primary {
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 5px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #0b5ed7;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    small.form-text {
      display: block;
      margin-top: 5px;
      font-size: 0.875rem;
      color: #6c757d;
    }

    #formMsg {
      padding: 12px;
      border-radius: 5px;
      text-align: center;
      font-weight: 500;
    }

    /* Mobile Responsive Styles */
    @media (max-width: 768px) {
      body {
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .container {
        padding: 20px;
        border-radius: 8px;
        max-width: 100%;
        margin: 0 10px;
      }

      h2 {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
      }

      h4 {
        font-size: 1.1rem;
        margin-top: 1.5rem;
        margin-bottom: 1rem;
      }

      .row {
        margin-bottom: 0;
      }

      .col-md-6 {
        width: 100% !important;
        padding-right: 0 !important;
        padding-left: 0 !important;
        margin-bottom: 1rem;
      }

      .row.g-3 {
        gap: 0 !important;
      }

      .row.g-3 > [class*='col-'] {
        padding-right: 0 !important;
        padding-left: 0 !important;
        margin-bottom: 1.5rem;
      }

      .form-label {
        font-size: 0.95rem;
        margin-bottom: 6px;
      }

      .form-control, .form-select {
        padding: 10px;
        font-size: 16px;
        border-radius: 4px;
      }

      .form-group {
        margin-bottom: 1.2rem;
      }

      .btn-primary {
        padding: 10px 16px;
        font-size: 15px;
        width: 100%;
      }

      .d-grid {
        margin-top: 1.5rem;
      }

      small.form-text {
        font-size: 0.8rem;
        margin-top: 4px;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 15px;
        border-radius: 6px;
        margin: 0 5px;
      }

      h2 {
        font-size: 1.3rem;
        margin-bottom: 1.2rem;
      }

      h4 {
        font-size: 1rem;
        margin-top: 1.2rem;
        margin-bottom: 0.8rem;
      }

      .form-label {
        font-size: 0.9rem;
      }

      .form-control, .form-select {
        padding: 8px;
        font-size: 16px;
      }

      .btn-primary {
        padding: 10px 12px;
        font-size: 14px;
      }

      #formMsg {
        font-size: 0.9rem;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4 text-center">Solicitud de visado - Paso 2</h2>
    <form id="visaStep2Form">
      
      <h4 class="text-primary fw-bold">Otros datos personales</h4>
      <div class="row g-3">
        <div class="col-md-6">
          <label for="occupation" class="form-label">Profesi&#243;n</label>
          <input type="text" class="form-control" id="occupation" required="">
        </div>

        <div class="col-md-6">
          <label for="nationality" class="form-label">Nacionalidad</label>
          <input type="text" class="form-control" id="nationality" required="">
        </div>

        <div class="col-md-6">
          <label for="currentResidenceCountry" class="form-label">Residencia actual Pa&#237;s</label>
          <input type="text" class="form-control" id="currentResidenceCountry" required="">
        </div>

        <div class="col-md-6">
          <label for="provinceState" class="form-label">Provincia/Estado</label>
          <input type="text" class="form-control" id="provinceState" required="">
        </div>

        <div class="col-md-6">
          <label for="idType" class="form-label">Tipo de DNI</label>
          <select class="form-select" id="idType" required="">
            <option value="" selected="" disabled="">Seleccione tipo de DNI</option>
            <option value="National ID">DNI</option>
            <option value="Driver's License">Permiso de conducir</option>
            <option value="International Passport">Pasaporte internacional</option>
          </select>
        </div>

        <div class="col-md-6">
          <label for="idNumber" class="form-label">N&#250;mero de identificaci&#243;n</label>
          <input type="text" class="form-control" id="idNumber" required="">
        </div>

        <div class="col-md-6">
          <label for="staffId" class="form-label">Identificaci&#243;n del personal (opcional)</label>
          <input type="text" class="form-control" id="staffId">
        </div>
      </div>

      <h4 class="text-primary fw-bold">Informaci&#243;n del viaje</h4>
      <div class="row g-3">
        <div class="col-md-6">
          <label for="purposes" class="form-label">Motivo del viaje</label>
          <input type="text" class="form-control" id="purposes" required="">
        </div>

        <div class="col-md-6">
          <label for="countryToVisa" class="form-label">Pa&#237;s para el que solicita el visado</label>
          <input type="text" class="form-control" id="countryToVisa" required="">
        </div>

        <div class="col-md-6">
          <label for="provinceToVisa" class="form-label">Provincia para la que solicita el visado</label>
          <input type="text" class="form-control" id="provinceToVisa" required="">
        </div>

        <div class="col-md-6">
          <label for="visaType" class="form-label">Tipo de visado</label>
          <select class="form-select" id="visaType" required="">
            <option value="" selected="" disabled="">Seleccione el tipo de visado</option>
            <option value="Tourist Visa">Visado de turista</option>
            <option value="Student Visa">Visado de Estudiante</option>
            <option value="Work Visa">Visado de Trabajo</option>
            <option value="Business Visa">Visado de negocios</option>
            <option value="Transit Visa">Visado de tr&#225;nsito</option>
            <option value="Permanent Residence">Residencia permanente</option>
            <option value="Family/Spouse Visa">Visado familiar/de c&#243;nyuge</option>
            <option value="Diplomatic/Official Visa">Visado diplom&#225;tico/oficial</option>
            <option value="Refugee/Humanitarian Visa">Visado de refugiado/humanitario</option>
          </select>
        </div>
      </div>
      <div class="col-md-6">
      <label class="form-label">Tipo de patrocinio</label>
      <select class="form-select" id="sponsorshipType" required="">
      <option value="">Seleccione</option>
      <option>40% Patrocinio</option>
      <option>Patrocinio del 60</option>
      <option>Patrocinio total</option>
      </select>
      </div>
      <div class="form-group">
        <label for="travelingDate" class="form-label">Fecha de viaje <span class="required-indicator">*</span></label>
        <input type="date" id="travelingDate" name="travelingDate" required="" aria-describedby="travelingDateHelp" class="form-control">
        <small id="travelingDateHelp" class="form-text text-muted">Por favor, seleccione su fecha prevista de salida.</small>
      </div>

      <div class="form-group">
        <label for="returningDate" class="form-label">Fecha de regreso <span class="required-indicator">*</span></label>
        <input type="date" id="returningDate" name="returningDate" required="" aria-describedby="returningDateHelp" class="form-control">
        <small id="returningDateHelp" class="form-text text-muted">Por favor, seleccione su fecha prevista de regreso. Debe ser en o despu&#233;s de la fecha de viaje.</small>
      </div>

      <h4 class="text-primary fw-bold">Informaci&#243;n sobre el pasaporte</h4>
      <div class="row g-3">
        <div class="col-md-6">
          <label for="passportNumber" class="form-label">N&#250;mero de pasaporte</label>
          <input type="text" class="form-control" id="passportNumber" required="">
        </div>

        <div class="col-md-6">
          <label for="passportCountry" class="form-label">Pa&#237;s emisor del pasaporte</label>
          <input type="text" class="form-control" id="passportCountry" required="">
        </div>

        <div class="col-md-6">
          <label for="passportExpiry" class="form-label">Fecha de caducidad del pasaporte</label>
          <input type="date" class="form-control" id="passportExpiry" required="">
        </div>
      </div>

      <div class="d-grid mt-4">
        <button type="button" id="nextBtn" class="btn btn-primary">Siguiente</button>
      </div>

      <div id="formMsg" class="mt-3"></div>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDO5Bpeg0Ewg6lUzbIaI-Kp4wC9ET6OQfE",
      authDomain: "visasponsor-e62c2.firebaseapp.com",
      projectId: "visasponsor-e62c2",
      storageBucket: "visasponsor-e62c2.appspot.com",
      messagingSenderId: "179101134570",
      appId: "1:179101134570:web:bea801f12c1a620717b193"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(async user => {
      if (!user) return window.location.href = "index.html";

      const docRef = db.collection("visaApplications").doc(user.uid);
      const doc = await docRef.get();

      if (!doc.exists || doc.data().progress < 2) {
        return window.location.href = "application_form1.html";
      }

      const data = doc.data();
      document.getElementById("travelingDate").value = data.travelingDate || "";
      document.getElementById("returningDate").value = data.returningDate || "";
      document.getElementById("occupation").value = data.occupation || "";
      document.getElementById("nationality").value = data.nationality || "";
      document.getElementById("currentResidenceCountry").value = data.currentResidenceCountry || "";
      document.getElementById("provinceState").value = data.provinceState || "";
      document.getElementById("idType").value = data.idType || "";
      document.getElementById("idNumber").value = data.idNumber || "";
      document.getElementById("staffId").value = data.staffId || "";
      document.getElementById("purposes").value = data.purposes || "";
      document.getElementById("countryToVisa").value = data.countryToVisa || "";
      document.getElementById("provinceToVisa").value = data.provinceToVisa || "";
      document.getElementById("visaType").value = data.visaType || "";
      document.getElementById("passportNumber").value = data.passportNumber || "";
      document.getElementById("passportCountry").value = data.passportCountry || "";
      document.getElementById("passportExpiry").value = data.passportExpiry || "";
    });

    document.getElementById("nextBtn").addEventListener("click", async () => {
      const form = document.getElementById("visaStep2Form");
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const user = auth.currentUser;
      if (!user) return;

      const formData = {
        occupation: document.getElementById("occupation").value.trim(),
        nationality: document.getElementById("nationality").value.trim(),
        currentResidenceCountry: document.getElementById("currentResidenceCountry").value.trim(),
        provinceState: document.getElementById("provinceState").value.trim(),
        idType: document.getElementById("idType").value.trim(),
        idNumber: document.getElementById("idNumber").value.trim(),
        staffId: document.getElementById("staffId").value.trim(),
        purposes: document.getElementById("purposes").value.trim(),
        countryToVisa: document.getElementById("countryToVisa").value.trim(),
        provinceToVisa: document.getElementById("provinceToVisa").value.trim(),
        visaType: document.getElementById("visaType").value.trim(),
        travelingDate: document.getElementById("travelingDate").value,
        returningDate: document.getElementById("returningDate").value,
        passportNumber: document.getElementById("passportNumber").value.trim(),
        passportCountry: document.getElementById("passportCountry").value.trim(),
        passportExpiry: document.getElementById("passportExpiry").value,
        progress: 3,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        await db.collection("visaApplications").doc(user.uid).set(formData, { merge: true });
        window.location.href = "eligibility.html";
      } catch (err) {
        document.getElementById("formMsg").innerHTML = `<span class="text-danger">Error: ${err.message}</span>`;
      }
    });
    
    const travelDate = new Date(document.getElementById("travelingDate").value);
    const returnDate = new Date(document.getElementById("returningDate").value);

    if(returnDate < travelDate){
    document.getElementById("formMsg").innerHTML =
    "<span class='text-danger'>Return date must be after travel date.</span>";
    return;
    }
    sponsorshipType: document.getElementById("sponsorshipType").value
  </script>
</body>
</html>
